# Vanity-redirect: nbsp.myaibox.ai → https://myaibox.ai/admin
# Поддомен «nbsp» — короткий alias для админки. Сам этот сервер ничего не
# хостит: и `http`, и `https` варианты делают 301 на основной web-домен.
#
# `$request_uri` сохраняется, чтобы deep-link'и вида
# `nbsp.myaibox.ai/some/path?q=1` нормально дотягивались до
# `myaibox.ai/admin/some/path?q=1` — SPA-роутер админки разрулит дальше.
#
# Enable: ln -sf /opt/metaboxaibot/infra/nginx/nginx.nbsp.conf /etc/nginx/sites-enabled/nbsp
# Перед reload'ом nginx — получить SSL:
#   sudo certbot --nginx -d nbsp.myaibox.ai

server {
    listen 80;
    server_name nbsp.myaibox.ai;
    return 301 https://nbsp.myaibox.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nbsp.myaibox.ai;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/nbsp.myaibox.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nbsp.myaibox.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options    nosniff                      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://myaibox.ai/admin$request_uri;
}
