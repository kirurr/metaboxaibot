# nginx config for the STAGE Telegram Mini App на домене stage.tma.myaibox.ai.
# Зеркало `nginx.myaibox-tma.conf` (prod на tma.myaibox.ai), но указывает на
# stage-контейнер (`127.0.0.1:3002`) и stage-статику (`/var/www/metabox-ai-test`).
# Аналог `nginx.test.conf` (stage.aibox.metabox.global), просто на новом домене.
#
# Enable: ln -sf /opt/metaboxaibot-test/infra/nginx/nginx.myaibox-tma-stage.conf /etc/nginx/sites-enabled/myaibox-tma-stage
# Перед reload'ом nginx — получить SSL:
#   sudo certbot --nginx -d stage.tma.myaibox.ai

limit_req_zone $binary_remote_addr zone=myaibox_tma_stage_api:10m rate=45r/m;
limit_req_zone $binary_remote_addr zone=myaibox_tma_stage_gen:10m rate=60r/m;

# WebSocket upgrade helper. Имя `$ws_myaibox_tma_stage_upgrade` уникально,
# чтобы coexist с другими vhost'ами на том же nginx-инстансе без duplicate-map ошибки.
map $http_upgrade $ws_myaibox_tma_stage_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name stage.tma.myaibox.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stage.tma.myaibox.ai;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/stage.tma.myaibox.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.tma.myaibox.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    # X-Frame-Options intentionally omitted — Telegram Mini App requires iframe embedding.
    # frame-ancestors в CSP — современный аналог и разрешает только Telegram-origin'ы.
    add_header Content-Security-Policy   "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
    add_header X-Content-Type-Options    nosniff                      always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
      text/xml application/xml text/javascript image/svg+xml;

    # ── Body size ─────────────────────────────────────────────────────────────
    # Default nginx 1 MB режет аплоады (мини-аппа / webapp /web/chat-uploads).
    # Fastify allow 25 MB → nginx должен пропускать хотя бы столько же + запас.
    client_max_body_size 30M;

    # ── API proxy → Docker container (127.0.0.1:3002 for test) ───────────────
    location /api/ {
        limit_req zone=myaibox_tma_stage_api burst=40 nodelay;

        proxy_pass         http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Socket.IO handshake + WebSocket upgrade (fastify-socket.io) ──────────
    # Контейнер один на mini-app и web, поэтому /socket.io/ проксируем и здесь.
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3002/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $ws_myaibox_tma_stage_upgrade;

        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ── Swagger UI static assets (absolute paths from @fastify/swagger-ui) ────
    location /docs/ {
        proxy_pass         http://127.0.0.1:3002/docs/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA (мини-аппа) — static files deployed by CI ──────────────────
    location / {
        limit_req zone=myaibox_tma_stage_gen burst=40 nodelay;

        root  /var/www/metabox-ai-test;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
