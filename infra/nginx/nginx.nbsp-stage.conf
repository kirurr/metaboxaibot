# Vanity-redirect: stage.nbsp.myaibox.ai → https://stage.myaibox.ai/admin
# Stage-аналог `nginx.nbsp.conf` — короткий alias для админки на стенде.
#
# Enable: ln -sf /opt/metaboxaibot-test/infra/nginx/nginx.nbsp-stage.conf /etc/nginx/sites-enabled/nbsp-stage
# Перед reload'ом nginx — получить SSL:
#   sudo certbot --nginx -d stage.nbsp.myaibox.ai

server {
    listen 80;
    server_name stage.nbsp.myaibox.ai;
    return 301 https://stage.nbsp.myaibox.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stage.nbsp.myaibox.ai;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/stage.nbsp.myaibox.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.nbsp.myaibox.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options    nosniff                      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://stage.myaibox.ai/admin$request_uri;
}
