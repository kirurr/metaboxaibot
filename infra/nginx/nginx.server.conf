# nginx config for the host server (not Docker)
# Place at: /etc/nginx/sites-available/metabox
# Enable: ln -sf /opt/metabox/infra/nginx/nginx.server.conf /etc/nginx/sites-available/metabox
#         ln -sf /etc/nginx/sites-available/metabox /etc/nginx/sites-enabled/metabox
#
# Before use:
#   1. Obtain SSL cert: certbot --nginx -d aibox.metabox.global
#   2. nginx -t && systemctl reload nginx

# limit_req_zone must be at http{} level — this file is included inside http{} by nginx
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=45r/m;
limit_req_zone $binary_remote_addr zone=general:10m   rate=60r/m;

server {
    listen 80;
    server_name aibox.metabox.global;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aibox.metabox.global;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/aibox.metabox.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aibox.metabox.global/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    # X-Frame-Options intentionally omitted — Telegram Mini App requires iframe embedding.
    # frame-ancestors in CSP is the modern equivalent and allows only Telegram origins.
    add_header Content-Security-Policy   "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
    add_header X-Content-Type-Options    nosniff                      always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
      text/xml application/xml text/javascript image/svg+xml;

    # ── Body size ─────────────────────────────────────────────────────────────
    # Default nginx 1 MB режет аплоады (мини-аппа / webapp /web/chat-uploads).
    # Fastify allow 25 MB → nginx должен пропускать хотя бы столько же + запас.
    client_max_body_size 30M;

    # ── API proxy → Docker container (127.0.0.1:3001) ────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Swagger UI static assets (absolute paths generated by @fastify/swagger-ui) ──
    # swagger-ui generates absolute URLs like /docs/static/* and /docs/json,
    # which the browser requests directly (without the /api prefix).
    location /docs/ {
        proxy_pass         http://127.0.0.1:3001/docs/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Grafana — access via SSH tunnel in prod, or expose here if needed ────
    # Uncomment and protect with basic auth if you want web access:
    # location /grafana/ {
    #     proxy_pass http://127.0.0.1:3000/;
    #     proxy_set_header Host $host;
    #     auth_basic "Restricted";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    # }

    # ── React SPA — static files deployed by CI ───────────────────────────────
    location / {
        limit_req zone=general burst=40 nodelay;

        root  /var/www/metabox;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
