# nginx config for the PROD webapp на домене myaibox.ai.
# Зеркало `nginx.web-prod.conf` (ai.metabox.global) — статика и API одни и те же
# (`/var/www/metabox-web` + `127.0.0.1:3001`), разница только в server_name + SSL.
#
# Enable: ln -sf /opt/metaboxaibot/infra/nginx/nginx.myaibox-web.conf /etc/nginx/sites-enabled/myaibox-web
# Перед reload'ом nginx — получить SSL:
#   sudo certbot --nginx -d myaibox.ai -d www.myaibox.ai

limit_req_zone $binary_remote_addr zone=myaibox_web:10m rate=60r/m;

server {
    listen 80;
    server_name myaibox.ai www.myaibox.ai;
    return 301 https://myaibox.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.myaibox.ai;

    ssl_certificate     /etc/letsencrypt/live/myaibox.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myaibox.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://myaibox.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myaibox.ai;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/myaibox.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myaibox.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options    nosniff                      always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
      text/xml application/xml text/javascript image/svg+xml;

    # ── Body size ─────────────────────────────────────────────────────────────
    # Default nginx 1 MB режет фото-аттачи /web/chat-uploads (Fastify allow 25 MB,
    # nginx должен пропустить хотя бы столько же + запас на multipart-overhead).
    client_max_body_size 30M;

    # ── SSE endpoint (чат) — отключаем буферизацию, длинный timeout ───────────
    location ~ ^/api/web/dialogs/[^/]+/send$ {
        limit_req zone=myaibox_web burst=10 nodelay;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 10m;
        proxy_send_timeout 10m;
        chunked_transfer_encoding on;
    }

    # ── API proxy → Docker container (127.0.0.1:3001 for prod) ────────────────
    location /api/ {
        limit_req zone=myaibox_web burst=40 nodelay;

        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Web SPA — static files deployed by CI ─────────────────────────────────
    location / {
        limit_req zone=myaibox_web burst=40 nodelay;

        root  /var/www/metabox-web;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
