# nginx config for the TEST webapp (stage.ai.metabox.global)
# Enable: ln -sf /opt/metaboxaibot-test/infra/nginx/nginx.web-test.conf /etc/nginx/sites-enabled/metabox-web-test

limit_req_zone $binary_remote_addr zone=web_test:10m rate=60r/m;

# WebSocket upgrade helper. Имя `$ws_web_test_upgrade` уникально, чтобы coexist
# с другими vhost'ами на том же nginx-инстансе без duplicate-map ошибки.
map $http_upgrade $ws_web_test_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name stage.ai.metabox.global;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stage.ai.metabox.global;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/stage.ai.metabox.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.ai.metabox.global/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options    nosniff                      always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
      text/xml application/xml text/javascript image/svg+xml;

    # ── Body size ─────────────────────────────────────────────────────────────
    # Default nginx 1 MB режет фото-аттачи /web/chat-uploads (Fastify allow 25 MB,
    # nginx должен пропустить хотя бы столько же + запас на multipart-overhead).
    client_max_body_size 30M;

    # ── SSE endpoint (чат) — отключаем буферизацию, длинный timeout ───────────
    location ~ ^/api/web/dialogs/[^/]+/send$ {
        limit_req zone=web_test burst=10 nodelay;

        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 10m;
        proxy_send_timeout 10m;
        chunked_transfer_encoding on;
    }

    # ── API proxy → same Docker container as miniapp (127.0.0.1:3002 for test) ──
    location /api/ {
        limit_req zone=web_test burst=40 nodelay;

        proxy_pass         http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Socket.IO handshake + WebSocket upgrade (fastify-socket.io) ──────────
    # Без этого location'ы /socket.io/ улетал в SPA-fallback → отдавался
    # index.html → engine.io клиент парсил его как «server error».
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3002/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $ws_web_test_upgrade;

        # Long-polling: server долго держит ответ → 60s read_timeout рвал бы коннект.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ── Web SPA — static files deployed by CI ─────────────────────────────────
    location / {
        limit_req zone=web_test burst=40 nodelay;

        root  /var/www/metabox-web-test;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
