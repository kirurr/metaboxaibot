# nginx config for the TEST server (stage.ai.meta-box.ru)
# Place at: /etc/nginx/sites-available/metabox-test
# Enable: ln -sf /opt/metaboxaibot-test/infra/nginx/nginx.test.conf /etc/nginx/sites-available/metabox-test
#         ln -sf /etc/nginx/sites-available/metabox-ai-test /etc/nginx/sites-enabled/metabox-ai-test
#
# Before use:
#   1. Obtain SSL cert: certbot --nginx -d stage.ai.meta-box.ru
#   2. mkdir -p /var/www/metabox-ai-test
#   3. nginx -t && systemctl reload nginx

# limit_req_zone must be at http{} level — this file is included inside http{} by nginx
limit_req_zone $binary_remote_addr zone=api_limit_test:10m rate=45r/m;
limit_req_zone $binary_remote_addr zone=general_test:10m   rate=60r/m;

# WebSocket upgrade helper (used by the local-tunnel server block below).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name stage.aibox.metabox.global;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stage.aibox.metabox.global;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/stage.aibox.metabox.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.aibox.metabox.global/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    # X-Frame-Options intentionally omitted — Telegram Mini App requires iframe embedding.
    # frame-ancestors in CSP is the modern equivalent and allows only Telegram origins.
    add_header Content-Security-Policy   "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
    add_header X-Content-Type-Options    nosniff                      always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
      text/xml application/xml text/javascript image/svg+xml;

    # ── Body size ─────────────────────────────────────────────────────────────
    # Default nginx 1 MB режет аплоады (мини-аппа / webapp /web/chat-uploads).
    # Fastify allow 25 MB → nginx должен пропускать хотя бы столько же + запас.
    client_max_body_size 30M;

    # ── API proxy → Docker container (127.0.0.1:3002) ────────────────────────
    location /api/ {
        limit_req zone=api_limit_test burst=40 nodelay;

        proxy_pass         http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Socket.IO handshake + WebSocket upgrade (fastify-socket.io) ──────────
    # Дефолтный path сервера — `/socket.io/`. Web-фронт коннектится same-origin
    # (см. `packages/web/src/utils/ws.ts`), nginx форвардит на тот же контейнер
    # что и `/api/`. Без `Upgrade`/`Connection` заголовков апгрейд до WebSocket
    # не происходит и socket.io застрянет на long-polling fallback'е, который
    # тоже здесь работает (по тому же пути).
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3002/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade — используем `connection_upgrade` map'у из верха файла.
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # WS — long-lived; стандартные 60s read_timeout рвут idle-соединения.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ── Swagger UI static assets (absolute paths generated by @fastify/swagger-ui) ──
    # swagger-ui generates absolute URLs like /docs/static/* and /docs/json,
    # which the browser requests directly (without the /api prefix).
    location /docs/ {
        proxy_pass         http://127.0.0.1:3002/docs/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA — static files deployed by CI ───────────────────────────────
    location / {
        limit_req zone=general_test burst=40 nodelay;

        root  /var/www/metabox-ai-test;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ── Local dev tunnel ──────────────────────────────────────────────────────
# Proxies stage.local.aibox.metabox.global → 127.0.0.1:8888, which is expected
# to be a reverse SSH tunnel from a developer machine:
#   ssh -N -R 8888:localhost:<local-port> user@<server>
# sshd must keep the default GatewayPorts=no so the port stays bound to loopback.
server {
    listen 80;
    server_name stage.local.aibox.metabox.global;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stage.local.aibox.metabox.global;

    ssl_certificate     /etc/letsencrypt/live/stage.local.aibox.metabox.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.local.aibox.metabox.global/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Content-Security-Policy   "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
    add_header X-Content-Type-Options    nosniff                      always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket-ready: harmless for plain HTTP, enables Upgrade when needed.
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
