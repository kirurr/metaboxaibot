# Promtail config — metaboxaibot prod server.
#
# Читает docker-логи НАПРЯМУЮ из /var/lib/docker/containers/*/*-json.log
# через inotify+offset, минуя Docker daemon API.
#
# Причина — баг live-streaming endpoint'а в Docker 29.4 / containerd 2.2.3
# (инцидент 2026-05-24): `docker logs --follow` тихо зависает после
# catch-up'а на отдельных контейнерах. Промтейл с docker_sd_configs шёл
# именно через follow-pathway, поэтому стримы у api/bot/worker дохли
# после catch-up'а. File-tailing не зависит от daemon-side bug'ов вообще.
#
# `service`-label берётся из `attrs.tag` каждой строки лога. Тег пишется
# json-file driver'ом docker'а, когда в /etc/docker/daemon.json
# выставлено `log-opts.tag={{.Name}}` (см. infra/observability/README.md
# секцию про docker daemon configuration).

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # named volume → offset'ы тейлов переживают рестарты промтейла.
  # При первом запуске positions.yaml не содержит ключей под пути
  # /var/lib/docker/containers/..., поэтому промтейл прочитает каждый
  # json-файл с НАЧАЛА. Историю отрезает `drop: older_than: 1h` ниже.
  filename: /tmp/positions.yaml

clients:
  - url: https://loki.stage.meta-box.ru/loki/api/v1/push
    # 2 MiB / 5s — потолок при дефолтном Loki grpc_server_max_recv_msg_size
    # = 4 MiB (с protobuf overhead 2 MiB логов → ~2.2 MiB сообщения, ровно
    # под лимит). Реже-но-крупнее держит ~1 req/5s вместо ~10 req/s.
    batchsize: 2097152
    batchwait: 5s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker-files
    static_configs:
      - targets: [localhost]
        labels:
          server: aibot-prod
          # Glob по всем docker-контейнерам на хосте. Промтейл сам через
          # inotify подхватывает новые файлы при создании контейнеров.
          __path__: /var/lib/docker/containers/*/*-json.log

    relabel_configs:
      - source_labels: [__path__]
        regex: '/var/lib/docker/containers/([^/]+)/.+-json\.log'
        target_label: container_id

    pipeline_stages:
      # json-file driver format с log-opts.tag={{.Name}}:
      # {"log":"...","stream":"stdout","time":"...","attrs":{"tag":"aibot_api"}}
      - json:
          expressions:
            output: log
            time: time
            attrs:
      # attrs — вложенный json-объект, второй pass раскрывает tag из него.
      - json:
          expressions:
            tag:
          source: attrs
      # Docker подставляет {{.Name}} с ведущим слешем ("/aibot_api"),
      # стрипаем чтобы service-label совпадал с тем, как имена
      # хранились раньше при docker_sd_configs (без слеша).
      - replace:
          source: tag
          expression: '^/(.*)$'
          replace: '${1}'
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          # tag (имя контейнера из daemon log-opts) → label service.
          # Для контейнеров без log-opts.tag (например, созданных ДО
          # рестарта daemon'а) tag будет пустым — такие записи попадут
          # в Loki с service="", их видно только по server-label.
          service: tag
      # Cadvisor: stdout-логи бесполезны (метрики идут через /metrics
      # endpoint в Prometheus), плюс в его файле раньше копились sparse
      # NULL-блоки на 80+ MB, валящие Loki rate-limit. Дропаем по имени —
      # устойчиво к redeploy'ям (в отличие от container_id-фильтра).
      - match:
          selector: '{service="aibot_cadvisor"}'
          action: drop
          drop_counter_reason: cadvisor_noise
      # На initial catch-up'е промтейл может прочитать историю в файле
      # (до миграции на новый daemon-конфиг файлы могут содержать что-то
      # старое). Loki in-memory chunk window — около часа, всё старше
      # отрежется как "entry too far behind". Дропаем сами, чтобы не
      # шумел warning'ами и не тратил CPU.
      - drop:
          older_than: 1h
          drop_counter_reason: too_old_for_loki_window
      - output:
          source: output
