# Promtail config — metaboxaibot prod server.
#
# Читает docker-логи НАПРЯМУЮ из /var/lib/docker/containers/*/*-json.log
# через inotify+offset, минуя Docker daemon API.
#
# Причина — баг live-streaming endpoint'а в Docker 29.4 / containerd 2.2.3
# (инцидент 2026-05-24): `docker logs --follow` тихо зависает после
# catch-up'а на отдельных контейнерах (видимо, на тех у кого long-idle
# периоды между записями), а `docker logs --since` работает штатно.
# Промтейл с docker_sd_configs использует именно follow-pathway, поэтому
# стримы у api/bot/worker дохли после рестарта промтейла, а cadvisor
# (постоянный спам в stdout) — единственный, кто переживал. File-tailing
# не зависит от daemon-side bug'ов вообще.
#
# В качестве `service`-лейбла используем short container_id (первые 12 chars
# из path'а). Полноценные читаемые имена сервисов вернутся после второго
# шага миграции: `log-opts.tag={{.Name}}` в /etc/docker/daemon.json
# (требует `systemctl reload docker`) + парсинг `attrs.tag` из json'а.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # /tmp смонтирован через named volume → offset'ы тейлов переживают рестарты.
  # При первом запуске positions.yaml не содержит ключей вида
  # `/var/lib/docker/containers/<id>/...-json.log`, поэтому промтейл прочитает
  # каждый json-файл с НАЧАЛА. Историю отсекает `drop: older_than: 1h` ниже.
  filename: /tmp/positions.yaml

clients:
  - url: https://loki.stage.meta-box.ru/loki/api/v1/push
    # 2 MiB / 5s — потолок при дефолтном Loki grpc_server_max_recv_msg_size
    # = 4 MiB (с protobuf overhead 2 MiB логов → ~2.2 MiB сообщения, ровно
    # под лимит). Реже-но-крупнее держит ~1 req/5s вместо ~10 req/s.
    batchsize: 2097152
    batchwait: 5s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker-files
    static_configs:
      - targets: [localhost]
        labels:
          server: aibot-prod
          # Glob по всем docker-контейнерам на хосте. Промтейл сам через
          # inotify подхватывает новые файлы при создании контейнеров и
          # отслеживает ротацию.
          __path__: /var/lib/docker/containers/*/*-json.log

    relabel_configs:
      # /var/lib/docker/containers/<full_id>/<full_id>-json.log → container_id
      - source_labels: [__path__]
        regex: '/var/lib/docker/containers/([^/]+)/.+-json\.log'
        target_label: container_id
      # Short container_id (12 chars) как временный `service` label.
      # TODO заменить на attrs.tag после log-opts.tag={{.Name}} на daemon'е.
      - source_labels: [container_id]
        regex: '(.{12}).*'
        target_label: service

    pipeline_stages:
      # json-file driver format: {"log":"...","stream":"stdout","time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      # На первой миграции промтейл прочитает каждый json-файл целиком
      # (positions.yaml ещё не имеет ключей под этот scrape_config). Loki
      # in-memory chunk window — около часа, всё старше отрезается как
      # "entry too far behind". Дропаем сами на стороне промтейла — не
      # шлём в небо, не флудим warning'ами, экономим CPU.
      - drop:
          older_than: 1h
          drop_counter_reason: too_old_for_loki_window
      - labels:
          stream:
      - output:
          source: output
