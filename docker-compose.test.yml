services:
  postgres:
    image: postgres:16-alpine
    container_name: aibot_test_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5666:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    # Not exposed externally — accessible within Docker network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - grafana-aibot

  redis:
    image: redis:7-alpine
    container_name: aibot_test_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/aylivdele}/metabox-bot:${IMAGE_TAG:-test}
    container_name: aibot_test_bot
    restart: always
    # Graceful shutdown: даём боту до 5 минут на завершение текущих
    # handler'ов (LLM streaming на thinking-моделях может занимать ~3 мин).
    stop_grace_period: 5m
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_PUBLIC_URL: https://stage.aibox.metabox.global/api
      METABOX_LANDING_URL: https://stage.meta-box.ru
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/aylivdele}/metabox-api:${IMAGE_TAG:-test}
    container_name: aibot_test_api
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_PUBLIC_URL: https://stage.aibox.metabox.global/api
      METABOX_LANDING_URL: https://stage.meta-box.ru
    # Separate port from production (3001) to allow both on the same host
    ports:
      - "127.0.0.1:3002:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/aylivdele}/metabox-worker:${IMAGE_TAG:-test}
    container_name: aibot_test_worker
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_PUBLIC_URL: https://stage.aibox.metabox.global/api
      METABOX_LANDING_URL: https://stage.meta-box.ru
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_test_data:
  redis_test_data:
networks:
  grafana-aibot:
    external: true