name: Prod Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Пересобрать и задеплоить все модули"
        type: boolean
        default: false

# One production deployment at a time; newer push cancels the queued one
concurrency:
  group: prod-pipeline
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── CI ───────────────────────────────────────────────────────────────────────
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

  # ── CD ───────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      bot: ${{ steps.filter.outputs.bot }}
      worker: ${{ steps.filter.outputs.worker }}
      webapp: ${{ steps.filter.outputs.webapp }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        run: |
          set -e

          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            echo "api=true"    >> "$GITHUB_OUTPUT"
            echo "bot=true"    >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "webapp=true" >> "$GITHUB_OUTPUT"
            echo "web=true"    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin refs/tags/prod-deployed:refs/tags/prod-deployed 2>/dev/null || true

          if ! git rev-parse --verify prod-deployed >/dev/null 2>&1; then
            echo "No prod-deployed tag — building everything"
            echo "api=true"    >> "$GITHUB_OUTPUT"
            echo "bot=true"    >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "webapp=true" >> "$GITHUB_OUTPUT"
            echo "web=true"    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only prod-deployed HEAD)
          echo "Changed files since prod-deployed:"
          echo "$changed"

          match() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          echo "api=$(match    '^(packages/api|packages/shared|packages/shared-browser|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.api)')"    >> "$GITHUB_OUTPUT"
          echo "bot=$(match    '^(packages/bot|packages/api|packages/shared|packages/shared-browser|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.bot)')"    >> "$GITHUB_OUTPUT"
          echo "worker=$(match '^(packages/worker|packages/api|packages/shared|packages/shared-browser|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.worker)')" >> "$GITHUB_OUTPUT"
          echo "webapp=$(match '^(packages/webapp|packages/shared|packages/shared-browser|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.webapp)')"     >> "$GITHUB_OUTPUT"
          echo "web=$(match    '^(packages/web|packages/shared|packages/shared-browser|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.web)')"           >> "$GITHUB_OUTPUT"

  build-api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-api:latest
            ghcr.io/${{ github.repository_owner }}/metabox-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-bot:
    name: Build Bot
    needs: changes
    if: needs.changes.outputs.bot == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.bot
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-bot:latest
            ghcr.io/${{ github.repository_owner }}/metabox-bot:${{ github.sha }}
          cache-from: type=gha,scope=bot
          cache-to: type=gha,scope=bot,mode=max

  build-worker:
    name: Build Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-worker:latest
            ghcr.io/${{ github.repository_owner }}/metabox-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  build-webapp:
    name: Build & deploy webapp
    needs: changes
    if: needs.changes.outputs.webapp == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @metabox/shared-browser build
      - name: Build webapp
        run: pnpm --filter @metabox/webapp build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}
          VITE_LEARNING_URL: ${{ secrets.VITE_LEARNING_URL }}
          VITE_METABOX_LANDING_URL: ${{ secrets.VITE_METABOX_LANDING_URL }}
          VITE_METABOX_APP_URL: ${{ secrets.VITE_METABOX_APP_URL }}
      - name: Clear webapp dir on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # `mkdir -p` covers the first-deploy case when the directory doesn't
          # exist yet (rm -rf /nonexistent/* would otherwise abort the step).
          script: mkdir -p /var/www/metabox && rm -rf /var/www/metabox/*
      - name: Upload webapp dist to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "packages/webapp/dist/*"
          target: /var/www/metabox
          strip_components: 3

  build-web:
    name: Build & deploy web app
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @metabox/shared-browser build
      - name: Build web app
        run: pnpm --filter @metabox/web build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      - name: Clear web dir on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /var/www/metabox-web && rm -rf /var/www/metabox-web/*
      - name: Upload web dist to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "packages/web/dist/*"
          target: /var/www/metabox-web
          strip_components: 3

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [changes, build-api, build-bot, build-worker, build-webapp, build-web]
    permissions:
      contents: write
    if: |
      always() && !cancelled() &&
      (needs.build-api.result == 'success' ||
       needs.build-bot.result == 'success' ||
       needs.build-worker.result == 'success') &&
      needs.build-api.result != 'failure' &&
      needs.build-bot.result != 'failure' &&
      needs.build-worker.result != 'failure'
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
          # Mirror what test-pipeline does — pull/restart only services that
          # actually got rebuilt in this run. On first-ever deploy or when
          # only one service changed, this avoids a `docker compose pull` for
          # tags that don't exist in GHCR yet.
          BUILT_API: ${{ needs.build-api.result == 'success' && 'true' || 'false' }}
          BUILT_BOT: ${{ needs.build-bot.result == 'success' && 'true' || 'false' }}
          BUILT_WORKER: ${{ needs.build-worker.result == 'success' && 'true' || 'false' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,IMAGE_TAG,GHCR_IMAGE_PREFIX,BUILT_API,BUILT_BOT,BUILT_WORKER
          script: |
            set -e
            cd /opt/metaboxaibot

            echo "Logging in to ghcr.io..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Updating repo (compose file, nginx config)..."
            git -c "url.https://x-access-token:${GHCR_TOKEN}@github.com/.insteadOf=https://github.com/" pull origin main

            # Only update IMAGE_TAG if at least one service was rebuilt — otherwise
            # the version pin stays on whatever ran last successfully.
            if [ "$BUILT_API" = "true" ] || [ "$BUILT_BOT" = "true" ] || [ "$BUILT_WORKER" = "true" ]; then
              echo "Updating IMAGE_TAG and GHCR_IMAGE_PREFIX in .env..."
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env \
                || echo "IMAGE_TAG=$IMAGE_TAG" >> .env
              sed -i "s|^GHCR_IMAGE_PREFIX=.*|GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX|" .env \
                || echo "GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX" >> .env
            else
              echo "No services rebuilt — keeping existing IMAGE_TAG"
            fi

            # Pull only services that were actually rebuilt — avoids fetching
            # stale `:latest` tags for sibling services that didn't change.
            # Порядок api → worker → bot. Bot тянем ПОСЛЕДНИМ — бот наиболее
            # чувствителен к насыщению канала (long-polling к api.telegram.org),
            # так что пусть его pull идёт когда остальные уже скачаны и канал
            # полностью свободен. Также pull'им СТРОГО последовательно (по
            # одному сервису) вместо `pull a b c` — параллельные слои съедают
            # канал и юзеры видят бот "зависшим".
            SERVICES=""
            [ "$BUILT_API" = "true" ]    && SERVICES="$SERVICES api"
            [ "$BUILT_WORKER" = "true" ] && SERVICES="$SERVICES worker"
            [ "$BUILT_BOT" = "true" ]    && SERVICES="$SERVICES bot"

            if [ -n "$SERVICES" ]; then
              for svc in $SERVICES; do
                echo "Pulling $svc..."
                docker compose -f docker-compose.prod.yml pull "$svc"
              done

              echo "Restarting updated services:$SERVICES"
              # Передаём ОБА compose-файла (prod + observability) чтобы
              # `--remove-orphans` не снёс promtail/node-exporter/cadvisor:
              # они живут в том же compose project'е (имя папки), и без
              # объявления в -f аргументах docker считает их orphan'ами.
              docker compose \
                -f docker-compose.prod.yml \
                -f docker-compose.observability.yml \
                up -d --no-build --remove-orphans $SERVICES
            else
              echo "No new images to pull — skipping restart"
            fi

            echo "Pruning old images..."
            docker image prune -af

            # Ensure nginx configs are symlinked. Все first-deploy-safe
            # (`|| true` swallows "already exists") и идемпотентны:
            #   • nginx.server.conf       — Mini App + API на aibox.metabox.global
            #   • nginx.web-prod.conf     — Web SPA на ai.metabox.global
            #   • nginx.myaibox-tma.conf  — Mini App + API на tma.myaibox.ai (зеркало)
            #   • nginx.myaibox-web.conf  — Web SPA на myaibox.ai (зеркало)
            #   • nginx.nbsp.conf         — vanity-редирект nbsp.myaibox.ai → myaibox.ai/admin
            #   • nginx.metrics.conf      — Observability на metrics.aibox.metabox.global
            #
            # Для новых доменов перед первым reload'ом nginx нужно вручную
            # получить SSL-серты (Certbot не запускается из CI):
            #   sudo certbot --nginx -d myaibox.ai -d www.myaibox.ai
            #   sudo certbot --nginx -d tma.myaibox.ai
            #   sudo certbot --nginx -d nbsp.myaibox.ai
            # До этого `nginx -t` будет падать на отсутствующих сертах —
            # симлинки можно оставить, но физически серверы 443 не поднимутся.
            sudo ln -sf /opt/metaboxaibot/infra/nginx/nginx.server.conf       /etc/nginx/sites-enabled/metabox             2>/dev/null || true
            sudo ln -sf /opt/metaboxaibot/infra/nginx/nginx.web-prod.conf     /etc/nginx/sites-enabled/metabox-web         2>/dev/null || true
            sudo ln -sf /opt/metaboxaibot/infra/nginx/nginx.myaibox-tma.conf  /etc/nginx/sites-enabled/myaibox-tma         2>/dev/null || true
            sudo ln -sf /opt/metaboxaibot/infra/nginx/nginx.myaibox-web.conf  /etc/nginx/sites-enabled/myaibox-web         2>/dev/null || true
            sudo ln -sf /opt/metaboxaibot/infra/nginx/nginx.nbsp.conf         /etc/nginx/sites-enabled/nbsp                2>/dev/null || true
            sudo ln -sf /opt/metaboxaibot/infra/nginx/nginx.metrics.conf     /etc/nginx/sites-enabled/metabox-metrics     2>/dev/null || true

            sudo nginx -t && sudo systemctl reload nginx

            echo "Deploy complete — $IMAGE_TAG"

      - name: Mark deployed SHA
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/prod-deployed',
                sha,
                force: true,
              });
            } catch {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/prod-deployed',
                sha,
              });
            }
