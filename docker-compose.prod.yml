services:
  postgres:
    image: postgres:16-alpine
    container_name: aibot_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aibot_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    image: ${GHCR_IMAGE_PREFIX}/metabox-bot:${IMAGE_TAG:-latest}
    container_name: aibot_bot
    restart: always
    # Graceful shutdown: даём боту до 5 минут на завершение текущих
    # handler'ов (LLM streaming на thinking-моделях может занимать ~3 мин).
    # Bot сам ставит SHUTDOWN_TIMEOUT_MS=4m → форс-exit раньше Docker SIGKILL.
    stop_grace_period: 5m
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_PUBLIC_URL: https://tma.myaibox.ai/api
      METABOX_LANDING_URL: https://metabox.global
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: ${GHCR_IMAGE_PREFIX}/metabox-api:${IMAGE_TAG:-latest}
    container_name: aibot_api
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_PUBLIC_URL: https://tma.myaibox.ai/api
      METABOX_LANDING_URL: https://metabox.global
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ${GHCR_IMAGE_PREFIX}/metabox-worker:${IMAGE_TAG:-latest}
    container_name: aibot_worker
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_PUBLIC_URL: https://tma.myaibox.ai/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
